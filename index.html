<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goggle Share</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- <link rel="stylesheet" href="leaflet/leaflet.css" /> -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-container">
        <div class="search-box">
            <button><i class="material-icons">menu</i></button>
            <input type="text" id="search-input" placeholder="Search a City..." autocomplete="off">
            <button id="search-button"><i class="material-icons">search</i></button>
        </div>

        <div class="category-bar">
            <div class="group">
                <div class="chip cont-chip" data-continent="Europe">Europe</div>
                <div class="chip cont-chip" data-continent="Asia">Asia</div>
                <div class="chip cont-chip" data-continent="Americas">Americas</div>
                <div class="chip cont-chip" data-continent="Africa">Africa</div>
                <div class="chip cont-chip" data-continent="Oceania">Oceania</div>
            </div>
            <div class="v-separator"></div>
            <div class="group">
                <div class="chip poi-chip" data-type="restaurant"><i class="material-icons">restaurant</i>Restaurants</div>
                <div class="chip poi-chip" data-type="hotel"><i class="material-icons">hotel</i>Hotels</div>
            </div>
        </div>

        <div id="history-container" class="history-panel">
            <div class="history-header">
                <h4>Recent Searches</h4>
                <button id="clear-history" type="button">Clear</button>
            </div>
            <ul id="history-list"></ul>
        </div>
    </div>

    <div id="map"></div>

    <div id="info-card" class="info-card">
        <img id="loc-img" src="" alt="Location">
        <div class="info-content">
            <h2 id="loc-title"></h2>
            <p id="loc-desc"></p>
            <button class="close-btn" onclick="closeCard()">Close</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- <script src="leaflet/leaflet.js"></script> -->
    <script src="script.js"></script>
</body>
</html>
